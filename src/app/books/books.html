<h1>Quản lý sách</h1>
<div class = "search-section">
    <input class = "search" type="text" placeholder = "Tìm kiếm sách theo tiêu đề, tác giả...." >
        <select class = "category">
        <option>Thể loại</option>
        <option>Tất cả</option>
        <option>Tiểu thuyết</option>
        <option>Khoa học</option>
        <option>Truyện</option>
        </select>

        <select class = "status">
        <option>Trạng thái</option>
        <option>Tất cả</option>
        <option>Còn sách</option>
        <option>Hết sách</option>
        </select>

        <button
        class = "add-book"
        (click) = "showAddForm = true">
            + Thêm sách
        </button>
</div>
<br>
<table class="table" border = "1">
    <thead>
        <tr>
            <th>STT</th>
            <th>Tên sách</th>
            <th>Tác giả</th>
            <th>Danh mục</th>
            <th>Năm xuất bản</th>
            <th>Số lượng</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor = "let book of books">
            <td>{{book.stt}}</td>
            <td>{{book.title}}</td>
            <td>{{book.author}}</td>
            <td>{{book.category}}</td>
            <td>{{book.year}}</td>
            <td>{{book.quantity}}</td>
            <td>{{book.status}}</td>

            <td>
                <button (click) = "editBook(book)">Sửa</button>
                <button (click) = "deleteBook(book)">Xóa</button>
            </td>
        </tr>
    </tbody>
</table>
<div
  class="popup"
  *ngIf="showAddForm"
>

  <h2>Thêm sách</h2>

  <input
    type="text"
    placeholder="Tên sách"
    [(ngModel)]="newTitle"
  >

  <br><br>

  <input
    type="text"
    placeholder="Tác giả"
    [(ngModel)]="newAuthor"
  >

  <br><br>
  <input
    type="text"
    placeholder="Danh mục"
    [(ngModel)]="newCategory"
  >

  <br><br>
  <input
    type="text"
    placeholder="Năm xuất bản"
    [(ngModel)]="newYear"
  >

  <br><br>
  <input
    type="text"
    placeholder="Số lượng"
    [(ngModel)]="newQuantity"
  >

  <br><br>
  <input
    type="text"
    placeholder="Trạng thái"
    [(ngModel)]="newStatus"
  >

  <br><br>

  <div class="buttonAddBook">

    <button (click)="addBook()">
      Lưu
    </button>

    <button
      (click)="showAddForm = false"
    >
      Đóng
    </button>

  </div>

</div>
<button (click)="getPosts()">

  Test API

</button>
