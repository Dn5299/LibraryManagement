<h1>Quản lý sách</h1>
<div class = "search-section">
    <input class = "search" type="text" placeholder = "Tìm kiếm sách theo tiêu đề, tác giả...." >
        <select class = "category">
        <option>Thể loại</option>
        <option>Tất cả</option>
        <option>Tiểu thuyết</option>
        <option>Khoa học</option>
        <option>Truyện</option>
        </select>

        <select class = "status">
        <option>Trạng thái</option>
        <option>Tất cả</option>
        <option>Còn sách</option>
        <option>Hết sách</option>
        </select>

        <button class = "add-book">+ Thêm sách</button>
</div>
<br>
<table class="table" border = "1">
    <thead>
        <tr>
            <th>STT</th>
            <th>Tên sách</th>
            <th>Tác giả</th>
            <th>Danh mục</th>
            <th>Năm xuất bản</th>
            <th>Số lượng</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor = "let book of books">
            <td>{{book.stt}}</td>
            <td>{{book.title}}</td>
            <td>{{book.author}}</td>
            <td>{{book.category}}</td>
            <td>{{book.year}}</td>
            <td>{{book.quantity}}</td>
            <td>{{book.status}}</td>

            <td>
                <button (click) = "editBook(book)">Sửa</button>
                <button (click) = "deleteBook(book)">Xóa</button>
            </td>
        </tr>
    </tbody>
</table>
