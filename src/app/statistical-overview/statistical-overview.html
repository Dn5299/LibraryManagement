<h1>THỐNG KÊ CHUNG</h1>

<div class="dashboard">

    <div class="card">

        <h2>Tổng đầu sách</h2>

        <p>{{ totalTitles }}</p>

    </div>

    <div class="card">

        <h2>Tổng số lượng sách</h2>

        <p>{{ totalBooks }}</p>

    </div>

    <div class="card">

        <h2>Đang mượn</h2>

        <p>{{ borrowingCount }}</p>

    </div>

    <div class="card">

        <h2>Đã trả</h2>

        <p>{{ returnedCount }}</p>

    </div>

    <div class="card">

        <h2>Độc giả</h2>

        <p>{{ readersCount }}</p>

    </div>

</div>
