<h1>ĐĂNG NHẬP</h1>
<div class="login-box">
<input
        type="text"
        placeholder="Tên đăng nhập"
        [(ngModel)]="username"
    >

    <input
        type="password"
        placeholder="Mật khẩu"
        [(ngModel)]="password"
    >

    <button (click)="login()">
        Đăng nhập
    </button>

</div>
