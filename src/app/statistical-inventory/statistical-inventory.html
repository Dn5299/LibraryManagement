<h1>SÁCH TỒN ĐỌNG</h1>

<table class="table" border="1">

    <thead>

        <tr>

            <th>STT</th>

            <th>Tên sách</th>

            <th>Tác giả</th>

            <th>Danh mục</th>

            <th>Số lượng</th>

        </tr>

    </thead>

    <tbody>

        <tr *ngFor="let book of inventoryBooks; let i = index">

            <td>{{ i + 1 }}</td>

            <td>{{ book.title }}</td>

            <td>{{ book.author }}</td>

            <td>{{ book.category }}</td>

            <td>{{ book.quantity }}</td>

        </tr>

    </tbody>

</table>
